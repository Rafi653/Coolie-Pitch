{% extends "base.html" %}

{% block title %}Add Question - Interview Prep{% endblock %}

{% block content %}
<div class="page-header">
    <h2>Add New Question</h2>
</div>

<form method="POST" class="form">
    <div class="form-group">
        <label for="title">Question Title *</label>
        <input type="text" id="title" name="title" required>
    </div>

    <div class="form-row">
        <div class="form-group">
            <label for="category">Category *</label>
            <select id="category" name="category" required>
                <option value="">Select category</option>
                <option value="Coding">Coding</option>
                <option value="System Design">System Design</option>
                <option value="Behavioral">Behavioral</option>
                <option value="SQL">SQL</option>
                <option value="Data Engineering">Data Engineering</option>
            </select>
        </div>

        <div class="form-group">
            <label for="difficulty">Difficulty *</label>
            <select id="difficulty" name="difficulty" required>
                <option value="">Select difficulty</option>
                <option value="Easy">Easy</option>
                <option value="Medium">Medium</option>
                <option value="Hard">Hard</option>
            </select>
        </div>

        <div class="form-group">
            <label for="company">Company</label>
            <input type="text" id="company" name="company" placeholder="e.g., Google, Meta">
        </div>
    </div>

    <div class="form-group">
        <label for="problem">Problem Statement *</label>
        <textarea id="problem" name="problem" rows="5" required></textarea>
    </div>

    <div class="form-group">
        <label for="solution">Solution Approach</label>
        <textarea id="solution" name="solution" rows="5"></textarea>
    </div>

    <div class="form-group">
        <label for="code">Code Solution</label>
        <textarea id="code" name="code" rows="8" class="code-editor"></textarea>
    </div>

    <div class="form-row">
        <div class="form-group">
            <label for="time_complexity">Time Complexity</label>
            <input type="text" id="time_complexity" name="time_complexity" placeholder="e.g., O(n)">
        </div>

        <div class="form-group">
            <label for="space_complexity">Space Complexity</label>
            <input type="text" id="space_complexity" name="space_complexity" placeholder="e.g., O(1)">
        </div>
    </div>

    <div class="form-group">
        <label for="notes">Notes/Key Insights</label>
        <textarea id="notes" name="notes" rows="3"></textarea>
    </div>

    <div class="form-actions">
        <button type="submit" class="btn btn-primary">Save Question</button>
        <a href="{{ url_for('questions') }}" class="btn btn-secondary">Cancel</a>
    </div>
</form>
{% endblock %}
