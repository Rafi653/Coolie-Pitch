{% extends "base.html" %}

{% block title %}Add Application - Interview Prep{% endblock %}

{% block content %}
<div class="page-header">
    <h2>Add New Application</h2>
</div>

<form method="POST" class="form">
    <div class="form-row">
        <div class="form-group">
            <label for="company">Company *</label>
            <input type="text" id="company" name="company" required placeholder="e.g., Google">
        </div>

        <div class="form-group">
            <label for="role">Role/Position *</label>
            <input type="text" id="role" name="role" required placeholder="e.g., Senior Data Engineer">
        </div>
    </div>

    <div class="form-row">
        <div class="form-group">
            <label for="applied_date">Applied Date *</label>
            <input type="date" id="applied_date" name="applied_date" required>
        </div>

        <div class="form-group">
            <label for="current_stage">Current Stage *</label>
            <select id="current_stage" name="current_stage" required>
                <option value="">Select stage</option>
                <option value="Applied">Applied</option>
                <option value="Phone Screen">Phone Screen</option>
                <option value="Technical Interview">Technical Interview</option>
                <option value="Onsite">Onsite</option>
                <option value="Final Round">Final Round</option>
                <option value="Offer">Offer</option>
                <option value="Rejected">Rejected</option>
            </select>
        </div>

        <div class="form-group">
            <label for="status">Status *</label>
            <select id="status" name="status" required>
                <option value="Active">Active</option>
                <option value="Completed">Completed</option>
                <option value="Rejected">Rejected</option>
                <option value="Withdrawn">Withdrawn</option>
            </select>
        </div>
    </div>

    <div class="form-group">
        <label for="contact_person">Contact Person</label>
        <input type="text" id="contact_person" name="contact_person" placeholder="Recruiter name">
    </div>

    <div class="form-group">
        <label for="notes">Notes</label>
        <textarea id="notes" name="notes" rows="5" placeholder="Add any notes about the application, interview feedback, or next steps..."></textarea>
    </div>

    <div class="form-actions">
        <button type="submit" class="btn btn-primary">Save Application</button>
        <a href="{{ url_for('applications') }}" class="btn btn-secondary">Cancel</a>
    </div>
</form>
{% endblock %}
